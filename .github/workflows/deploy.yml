name: enduro-kyiv-rental

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Оновлено до 20.x (LTS) або 22.x (Current/LTS)
        node-version: [20.x] 
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4 # Рекомендую оновити до v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4 # Оновлено до v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm run eslint
    - run: npm run format