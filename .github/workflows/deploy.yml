name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Или ваша ветка
  workflow_dispatch:

# Разрешения для деплоя
permissions:
  contents: read
  pages: write
  id-token: write

# Отмена предыдущих запусков, если запушили новый коммит
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # Убедитесь, что эта команда создает папку dist/ или out/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./dist # ИЛИ ./out, зависит от вашего фреймворка (Vite=dist, Next=out)
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        